services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hms_db
      POSTGRES_USER: hms_user
      POSTGRES_PASSWORD: hms_password
      # Performance optimizations
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    # Performance tuning for PostgreSQL
    # Note: Some parameters like shared_buffers require server restart
    # These are set via environment variables that PostgreSQL reads at startup
    command: >
      postgres
      -c effective_cache_size=1GB
      -c maintenance_work_mem=128MB
      -c checkpoint_completion_target=0.9
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=16MB
      -c max_connections=200
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_user -d hms_db"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: .
    # Use Gunicorn for production performance (much faster than runserver)
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput --clear || true &&
      gunicorn hms.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 4
      --worker-class gthread
      --max-requests 1000
      --max-requests-jitter 100
      --timeout 120
      --access-logfile -
      --error-logfile -
      --log-level info
      --preload
      "
    volumes:
      - .:/app
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for Docker (use 'db' hostname instead of 'localhost')
      - DATABASE_URL=postgresql://hms_user:hms_password@db:5432/hms_db
      # Override REDIS_URL for Docker (use 'redis' hostname instead of 'localhost')
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build: .
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      celery -A hms worker -l info
      "
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for Docker (use 'db' hostname instead of 'localhost')
      - DATABASE_URL=postgresql://hms_user:hms_password@db:5432/hms_db
      # Override REDIS_URL for Docker (use 'redis' hostname instead of 'localhost')
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery-beat:
    build: .
    command: >
      sh -c "
      python manage.py migrate --noinput &&
      celery -A hms beat -l info
      "
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for Docker (use 'db' hostname instead of 'localhost')
      - DATABASE_URL=postgresql://hms_user:hms_password@db:5432/hms_db
      # Override REDIS_URL for Docker (use 'redis' hostname instead of 'localhost')
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  postgres_data:
  redis_data:
  minio_data:
