services:
  # PostgreSQL is now running on PostgreSQL Desktop (host machine)
  # Connect to it using host.docker.internal:5432 from Docker containers
  # Make sure PostgreSQL Desktop is running and accepting connections on port 5432
  
  redis:
    image: redis:7.2-alpine
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  web:
    build: .
    # Use Gunicorn for production performance (much faster than runserver)
    command: >
      sh -c "
      python manage.py collectstatic --noinput --clear || true &&
      gunicorn hms.wsgi:application
      --bind 0.0.0.0:8000
      --workers 4
      --threads 4
      --worker-class gthread
      --max-requests 1000
      --max-requests-jitter 100
      --timeout 120
      --access-logfile -
      --error-logfile -
      --log-level info
      --preload
      "
    volumes:
      - .:/app
    ports:
      - "0.0.0.0:8000:8000"
    restart: unless-stopped
    environment:
      - DEBUG=1
      # Default to the repo's SQLite database so Docker matches Cursor data exactly.
      # Override DATABASE_URL in .env only if you really need Postgres.
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db.sqlite3}
      - REDIS_URL=redis://redis:6379/0
      - USE_REDIS_CACHE=True
      - ALLOWED_HOSTS=*
      - CSRF_TRUSTED_ORIGINS=http://localhost:8000,http://127.0.0.1:8000,http://0.0.0.0:8000,http://192.168.0.100:8000,http://192.168.0.*:8000,http://192.168.1.*:8000,http://192.168.2.*:8000
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  celery:
    build: .
    command: celery -A hms worker -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db.sqlite3}
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery-beat:
    build: .
    command: celery -A hms beat -l info
    volumes:
      - .:/app
    environment:
      - DEBUG=1
      - DATABASE_URL=${DATABASE_URL:-sqlite:///db.sqlite3}
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

volumes:
  # postgres_data:  # Removed - using PostgreSQL Desktop instead
  redis_data:
  minio_data:
