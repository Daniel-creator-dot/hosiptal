{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Assign Shift - {{ department.name }}{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2><i class="bi bi-clock-history"></i> Assign Shift</h2>
            <p class="text-muted">{{ department.name }}</p>
        </div>
        <a href="{% url 'hospital:hod_scheduling_dashboard' %}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Back
        </a>
    </div>
    
    <div class="card">
        <div class="card-header bg-info text-white">
            <h5 class="mb-0">Shift Assignment Details</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Staff Member *</label>
                        <select name="staff" class="form-select" required>
                            <option value="">Select staff...</option>
                            {% for staff_member in dept_staff %}
                            <option value="{{ staff_member.id }}">{{ staff_member.user.get_full_name|default:staff_member.user.username }} - {{ staff_member.get_profession_display|default:"Staff" }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Shift Date *</label>
                        <input type="date" name="shift_date" class="form-control" required>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Shift Type *</label>
                    <select name="shift_type" class="form-select" id="shiftType" required>
                        <option value="">Select shift type...</option>
                        <option value="morning">Morning Shift (6 AM - 2 PM)</option>
                        <option value="afternoon">Afternoon Shift (2 PM - 10 PM)</option>
                        <option value="night">Night Shift (10 PM - 6 AM)</option>
                        <option value="day">Day Shift (8 AM - 5 PM)</option>
                        <option value="custom">Custom Hours</option>
                    </select>
                </div>
                
                <div id="customTimeFields" style="display: none;">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Custom Start Time</label>
                            <input type="time" name="start_time" class="form-control">
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Custom End Time</label>
                            <input type="time" name="end_time" class="form-control">
                        </div>
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" placeholder="e.g., Ward A, Emergency, OPD">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Assigned Duties</label>
                    <textarea name="duties" class="form-control" rows="3" placeholder="Describe duties for this shift..."></textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-info">
                        <i class="bi bi-check-circle"></i> Assign Shift
                    </button>
                    <a href="{% url 'hospital:hod_scheduling_dashboard' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
    
</div>

<script>
document.getElementById('shiftType').addEventListener('change', function() {
    const customFields = document.getElementById('customTimeFields');
    if (this.value === 'custom') {
        customFields.style.display = 'block';
    } else {
        customFields.style.display = 'none';
    }
});
</script>

{% endblock %}
