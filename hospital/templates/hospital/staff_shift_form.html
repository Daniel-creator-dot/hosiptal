{% extends 'hospital/base.html' %}
{% load static %}

{% block title %}Create Shift - HMS{% endblock %}
{% block page_title %}Create Staff Shift{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="modern-card">
            <form method="post">
                {% csrf_token %}
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Staff <span class="text-danger">*</span></label>
                        <select name="staff" class="form-select form-control-modern" required title="Select option" aria-label="Select option">
                            <option value="">Select Staff</option>
                            {% for s in staff_list %}
                            <option value="{{ s.pk }}" {% if form_data.staff == s.pk|stringformat:"s" %}selected{% endif %}>{{ s.user.get_full_name|default:s.user.username }}{% if s.department %} — {{ s.department.name }}{% endif %}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Department <span class="text-danger">*</span></label>
                        <select name="department" class="form-select form-control-modern" required title="Select option" aria-label="Select option">
                            <option value="">Select Department</option>
                            {% for dept in departments %}
                            <option value="{{ dept.pk }}" {% if form_data.department == dept.pk|stringformat:"s" %}selected{% endif %}>{{ dept.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label">Shift Date <span class="text-danger">*</span></label>
                        <input type="date" name="shift_date" class="form-control form-control-modern" required value="{{ form_data.shift_date }}">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Shift Type <span class="text-danger">*</span></label>
                        <select name="shift_type" class="form-select form-control-modern" required title="Select option" aria-label="Select option">
                            <option value="day" {% if form_data.shift_type == "day" %}selected{% endif %}>Day Shift</option>
                            <option value="evening" {% if form_data.shift_type == "evening" %}selected{% endif %}>Evening Shift</option>
                            <option value="night" {% if form_data.shift_type == "night" %}selected{% endif %}>Night Shift</option>
                            <option value="on_call" {% if form_data.shift_type == "on_call" %}selected{% endif %}>On-Call</option>
                            <option value="weekend" {% if form_data.shift_type == "weekend" %}selected{% endif %}>Weekend</option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Location</label>
                        <select name="location" class="form-select form-control-modern" title="Select option" aria-label="Select option">
                            <option value="">Select Location (Optional)</option>
                            {% for ward in wards %}
                            <option value="{{ ward.pk }}" {% if form_data.location == ward.pk|stringformat:"s" %}selected{% endif %}>{{ ward.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Start Time <span class="text-danger">*</span></label>
                        <input type="time" name="start_time" class="form-control form-control-modern" required value="{{ form_data.start_time }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">End Time <span class="text-danger">*</span></label>
                        <input type="time" name="end_time" class="form-control form-control-modern" required value="{{ form_data.end_time }}">
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    <textarea name="notes" class="form-control form-control-modern" rows="3">{{ form_data.notes }}</textarea>
                </div>
                
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary-modern">
                        <i class="bi bi-check-circle"></i> Create Shift
                    </button>
                    <a href="{% url 'hospital:staff_shift_list' %}" class="btn btn-outline-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
