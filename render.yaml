# Render Blueprint Configuration
# Free-tier: single web service + external PostgreSQL (e.g. Supabase).
# Set DATABASE_URL manually in the Render dashboard (sync: false below).

services:
  - type: web
    name: hms-web
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: "./build.sh"
    startCommand: "gunicorn hms.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --access-logfile - --error-logfile - --log-level info"
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.5

      - key: DEBUG
        value: false

      - key: SECRET_KEY
        generateValue: true

      - key: ALLOWED_HOSTS
        sync: false

      # Paste your Supabase (or other) PostgreSQL URL in the Render dashboard.
      - key: DATABASE_URL
        sync: false

      - key: DATABASE_SSL_MODE
        value: require

      - key: REDIS_URL
        value: ""

      - key: USE_REDIS_CACHE
        value: false

      - key: CELERY_TASK_ALWAYS_EAGER
        value: true

      - key: DATABASE_CONN_MAX_AGE
        value: 600

      - key: DATABASE_CONN_HEALTH_CHECKS
        value: true

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: SMS_API_KEY
        sync: false

      - key: SMS_SENDER_ID
        value: PrimeCare

      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend

      - key: EMAIL_HOST
        sync: false

      - key: EMAIL_PORT
        value: 587

      - key: EMAIL_USE_TLS
        value: true

      - key: EMAIL_HOST_USER
        sync: false

      - key: EMAIL_HOST_PASSWORD
        sync: false

      - key: DEFAULT_FROM_EMAIL
        sync: false

      - key: HOSPITAL_NAME
        value: PrimeCare Hospital

      - key: SITE_URL
        sync: false

      - key: SECURE_SSL_REDIRECT
        value: true

      - key: SECURE_PROXY_SSL_HEADER
        value: HTTP_X_FORWARDED_PROTO,https
